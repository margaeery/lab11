services:
  go-service:
    build: ./go
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  python-service:
    build: ./python
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rust-service:
    build: ./rust
    ports:
      - "8083:8080"
    environment:
      - PORT=8080
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
